<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modes</title>

    <!-- LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/6.0.0/echarts.min.js" 
    xintegrity="sha512-4/g9GAdOdTpUP2mKClpKsEzaK7FQNgMjq+No0rX8XZlfrCGtbi4r+T/p5fnacsEC3zIAmHKLJUL7sh3/yVA4OQ==" 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.min.js" 
    xintegrity="sha512-n/G+dROKbKL3GVngGWmWfwK0yPctjZQM752diVYnXZtD/48agpUKLIn0xDQL9ydZ91x6BiOmTIFwWjjFi2kEFg==" 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer"></script>    
    
    <!-- STYLES -->
    <link rel="stylesheet" href="/styles/celeste-like-bg2.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="modes.css">
</head>
<body>
    
    <h2>Chart</h2>
    <div class="test-vis-modes-area test-2">
        <div class="chart-itself-wrapper">
            <div class="chart-itself"></div>
        </div>

        <div class="chart-stats-bottom">
            <div class="cs-block-1 cs-block"></div>
            <div class="cs-block-2 cs-block"></div>
            <div class="cs-block-3 cs-block"></div>
        </div>
    </div>


    <div class="carousel-toogle">
        <h3>Toogle Modes</h3>

        <div class="arrows-layer">
            <button class="toogle-left toogle-arrow">‹</button>
            <div class="toogle-label modes-label"></div>
            <button class="toogle-right toogle-arrow">›</button>
        </div>
        <div class="dots-layer">
            <div class="dot-toogle1 mode-dot"></div>
            <div class="dot-toogle2 mode-dot"></div>
            <div class="dot-toogle3 mode-dot"></div>
            <!-- <div class="dot-toogle4 mode-dot"></div> -->
        </div>
    </div>
    <!-- VISUALISATION MODES -->
    <div class="vis-modes-area">

        <div class="vis-mode active" data-mode="casual">
            <div class="casual-mode-main-area">
                <img src="/assets/close.jpg" alt="">
            </div>
        </div>

        <div class="vis-mode" data-mode="linear">
            <div class="chart-mode-main-area">
                <img src="/assets/close.jpg" alt="">
            </div>
        </div>

        <div class="vis-mode" data-mode="map">
            <div class="open-map-mode-main-area">
                <img src="/assets/close.jpg" alt="">
            </div>
        </div>

        <!-- <div class="vis-mode" data-mode="log">
            <div class="log-mode-main-area">
            </div>
        </div> -->

    </div>

    <h1>Modes Preview</h1>

    <!-- <h2>Casual</h2>
    <div class="test-vis-modes-area test-1">
        
    </div> -->
    


    <h2>Map</h2>
    <div class="test-vis-modes-area test-3">
        
    </div>


    <script src="index.js"></script>


    <script>
    function drawCenterLine() {
        const existingLine = document.getElementById('centerLine');
        if (existingLine) existingLine.remove();

        const centerX = document.documentElement.clientWidth / 2;
        const height = document.documentElement.clientHeight;

        const line = document.createElement('div');
        line.id = 'centerLine';

        line.style.left = `${centerX}px`;
        line.style.top = '0';
        line.style.width = '1px';
        line.style.height = `${height}px`;
        line.style.position = 'fixed';
        line.style.pointerEvents = 'none';
        line.style.zIndex = '999999';

        document.body.appendChild(line);
    }

    window.addEventListener('load', drawCenterLine);
    window.addEventListener('resize', drawCenterLine);
</script>
</body>
</html>
